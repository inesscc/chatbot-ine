
services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile.openwebui
    container_name: open-webui
    ports:
      - "3030:8080"
      - "11434:11434"
    volumes:
      - open-webui:/app/backend/data
      - ./ollama_models:/root/.ollama
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - db
    environment:
      # Example environment vars for connecting to Postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: toydb
      POSTGRES_USER: toyuser
      POSTGRES_PASSWORD: toypass
      OLLAMA_HOST: 0.0.0.0

  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: toy-postgres
    restart: always
    environment:
      POSTGRES_DB: toydb
      POSTGRES_USER: toyuser
      POSTGRES_PASSWORD: toypass
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 open-webui
    depends_on:
      - open-webui
volumes:
  open-webui:
  pgdata:
