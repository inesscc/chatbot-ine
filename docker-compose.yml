
services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile.openwebui
    container_name: open-webui
    ports:
      - "3030:8080"
      - "11434:11434"
    volumes:
      - open-webui:/app/backend/data
      - ./ollama_models:/root/.ollama
      # Mount configuration files for hot-reload on restart
      - ./postgres-tool-export.json:/app/postgres-tool-export.json:ro
      - ./models-export.json:/app/models-export.json:ro
      - ./import_tools.py:/app/import_tools.py:ro
      - ./start_with_tools.sh:/app/start_with_tools.sh:ro
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - db
    environment:
      # Example environment vars for connecting to Postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: toydb
      POSTGRES_USER: toyuser
      POSTGRES_PASSWORD: toypass
      OLLAMA_HOST: 0.0.0.0
    networks:
      - webui-net


  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: toy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: toydb
      POSTGRES_USER: toyuser
      POSTGRES_PASSWORD: toypass
    ports:
      - "5438:5432"
    networks:
      - webui-net
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount data and scripts for hot-reload on restart
      - ./data:/data:ro
      - ./load_parquet_to_db_auto.py:/scripts/load_parquet_to_db_auto.py:ro
  # watchtower:
  #   image: containrrr/watchtower
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --interval 300 open-webui
  #   depends_on:
  #     - open-webui
volumes:
  open-webui:
  pgdata:


networks:
  webui-net:
    external: true 
